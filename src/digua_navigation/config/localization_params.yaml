amcl:
  ros__parameters:
    use_sim_time: false

    # 你的实车 TF 链路：
    # map -> odom -> base_footprint -> base_link -> laser_frame
    global_frame_id: "map"
    odom_frame_id: "odom"
    base_frame_id: "base_footprint"
    scan_topic: "/scan"

    # AMCL 粒子数量，先保守一点
    min_particles: 500
    max_particles: 2000

    # 运动模型噪声参数，后面根据实车定位效果再调
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2

    # 激光模型
    laser_model_type: "likelihood_field"
    laser_max_range: 8.0
    laser_min_range: 0.05
    max_beams: 60

    # 更新阈值
    update_min_d: 0.10
    update_min_a: 0.10

    # 重采样和恢复
    resample_interval: 1
    recovery_alpha_slow: 0.0
    recovery_alpha_fast: 0.0

    # TF
    transform_tolerance: 1.0

    # 初始位姿先不在参数里固定，后面用 RViz 的 2D Pose Estimate 给
    set_initial_pose: false
    always_reset_initial_pose: false

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""

lifecycle_manager_localization:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names:
      - map_server
      - amcl